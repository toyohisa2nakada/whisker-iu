<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>答え合わせ - Whisker</title>

    <!-- 元のindex.htmlが依存しているwhisker関連のライブラリやスクリプトを読み込む -->
    <link rel="icon" type="image/png" href="assets/favicon_whisker.png" />
    <link rel="stylesheet" href="whisker-gui.css" />
    <script defer src="whisker-gui.js"></script>
    <script src="includes/bootstrap.js"></script>
    <script type="text/javascript" src="includes/jquery-1.4.3.min.js"></script>
    <script type="text/javascript" src="includes/jquery.fancybox-1.3.4.pack.js"></script>
    <!-- <script type="text/javascript" src="includes/prettify.js"></script> -->
    <link rel="stylesheet" href="includes/jquery.fancybox-1.3.4.css" type="text/css" media="screen" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            padding: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #333;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: bold;
            color: #1a202c;
            text-align: center;
        }

        .table-container {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 900px;
            margin: 0 auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            border-bottom: 1px solid #edf2f7;
            padding: 15px;
            text-align: left;
            vertical-align: middle;
        }

        .table th {
            background-color: #f7fafc;
            font-weight: bold;
            width: 60%;
            font-size: 1.1em;
            color: #4a5568;
            border-top: none;
        }

        .table td.result-col {
            width: 40%;
            font-weight: bold;
            font-size: 1.2em;
            text-align: center;
        }

        .drop-zone {
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #fbfdff;
        }

        .drop-zone:hover,
        .drop-zone.hover {
            background-color: #ebf4ff;
            border-color: #4299e1;
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        .drop-zone-text {
            font-size: 1.05em;
            color: #4a5568;
            margin-bottom: 15px;
        }

        .file-label {
            display: block;
            margin-top: 12px;
            color: #718096;
            font-size: 0.9em;
            word-break: break-all;
        }

        .btn-upload {
            background-color: #4299e1;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background-color 0.2s;
        }

        .btn-upload:hover {
            background-color: #3182ce;
        }

        /* ステータス別の色 */
        .status-unexecuted {
            color: #a0aec0;
        }

        .status-checking {
            color: #d69e2e;
        }

        .status-success {
            color: #38a169;
        }

        .status-fail {
            color: #e53e3e;
        }

        /* Whisker/Scratchの実行に必要な要素 (Headless実行のため、表示しない) */
        #scratch-stage-container {
            display: none;
        }
    </style>

</head>

<body>

            <input type="text" id="studentName" placeholder="氏名"
                class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100 disabled:text-gray-500 disabled:cursor-not-allowed">

            <button id="studentDataLock"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition-colors disabled:bg-gray-500 disabled:cursor-not-allowed">

    <!-- WhiskerやScratch-guiが実行時に要求する可能性のあるキャンバス要素 (Headless用) -->
    <div id="scratch-stage-container">
        <canvas id="scratch-stage" tabindex="1" width="480" height="360"></canvas>
    </div>

    <script type="module">
        const localStorage_key = "whisker-iu-studentData";
        function loadStudentData() {
            return JSON.parse(localStorage.getItem(localStorage_key) ?? "{}");
        }
        function localStorageKeyForSave() {
            const formattedDate = new Intl.DateTimeFormat('ja-JP', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).format(new Date()).replace(/\//g, '');
            return `${localStorage_key}_${formattedDate}`;
        }

        function updateStudentDataPanel(studentData) {
            document.getElementById("studentId").value = studentData?.studentId ?? "";
            document.getElementById("studentName").value = studentData?.studentName ?? "";
            if (studentData.studentId !== undefined) {
                document.getElementById("studentId").disabled = true;
                document.getElementById("studentName").disabled = true;
                document.getElementById("studentDataLock").disabled = true;
            }
        }

        document.getElementById("studentDataLock").addEventListener("click", () => {
            const studentId = document.getElementById("studentId").value;
            const studentName = document.getElementById("studentName").value;

            if (!/^\d{2}IM\d{4}$/i.test(studentId)) {
                alert("学籍番号の形式が違います。例: 25im0000");
                return;
            }
            if (studentName.length === 0) {
                alert("氏名を入力してください。");
                return;
            }

            if (true === confirm("ロックするとあとで変更することができません。ロックしてよろしいでしょうか？")) {
                studentData.studentId = studentId;
                studentData.studentName = studentName;
                localStorage.setItem(localStorage_key, JSON.stringify(studentData));
                updateStudentDataPanel(studentData);
            }

        })
        function checkStudentId() {
            const ret = studentData.studentId !== undefined && studentData.studentId?.length !== 0;
            if (ret === false) {
                alert("学籍番号、氏名を入力してLockしてください。")
            }
            return ret;
        }
        function post(data) {
            // iuアカウントの マイドライブ - [非公開] プログラミング基礎実習 - Scratch課題の進捗収集
            // スプレッドシートの拡張機能から、Apps ScriptでGASのコードが見れる
            const gasURL = "https://script.google.com/macros/s/AKfycbwOn4pY6Ac2bb2niGN29584aujma_LQG9bPaDCTX1E8uwbcXWiK8LOpnhZKcoEKbzw/exec";

            const postData = {
                ...studentData,
                ...data,
            };
            console.log("postData", postData);
            fetch(gasURL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(postData)
            }).then(() => {
                console.log("送信完了！スプレッドシートを確認してください。");
                saveKadaiStatus(data);
            }).catch(err => {
                console.error("エラー:", err);
            });
        }
        const studentData = loadStudentData();
        console.log(studentData);
        updateStudentDataPanel(studentData);

        function saveKadaiStatus(newData) {
            const data0 = JSON.parse(localStorage.getItem(localStorageKeyForSave()) ?? "[]");
            const index = data0.findIndex(item => item.kadaiId === newData.kadaiId);
            if (index !== -1) {
                data0[index] = newData;
            } else {
                data0.push(newData);
            }
            localStorage.setItem(localStorageKeyForSave(), JSON.stringify(data0));
        }
        function updateKadaiStatus() {
            const data = JSON.parse(localStorage.getItem(localStorageKeyForSave()) ?? "[]");
            data.forEach(({ kadaiId, success }) => {
                const resultCell = document.getElementById(`result-${kadaiId}`);
                resultCell.textContent = success;
                resultCell.className = `result-col ${success === "合格" ? "status-success" : "status-fail"}`;
            })
        }




        // ===【設定】=========================================
        // 問題の数 (n行) をここで変更できます
        // const ASSIGNMENT_FIRST = 1;
        // const ASSIGNMENT_LAST = 6;
        const ASSIGNMENTS = [11, 12, 1, 3, 4, 6, 7, 8, 9];

        // 判定用スクリプトの配置ディレクトリ
        const SCRIPT_BASE_DIR = 'kadai/';
        // ====================================================

        const kadaiCheckFilename = (kadaiId) => {
            return `${SCRIPT_BASE_DIR}kadai${kadaiId}.js`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const originalLink = document.createElement("a");
            console.log(window.location.href)
            const newPath = window.location.pathname.replace(/index-iu(\.html)?$/, '');
            originalLink.href = window.location.origin + newPath + "?lng=en";
            originalLink.textContent = "org test";
            document.getElementById("toOriginalPanel").appendChild(originalLink);

            const tableBody = document.getElementById('tableBody');
            // for (let i = ASSIGNMENT_FIRST; i <= ASSIGNMENT_LAST; i++) {
            ASSIGNMENTS.forEach((kanriNo, mondaiId) => {

                const kadaiId = kanriNo.toString().padStart(2, '0'); // '01', '02', ...
                const mondaiNo = mondaiId + 1;

                const tr = document.createElement('tr');

                // --- 列1: ファイルアップロード用のセル ---
                const tdInput = document.createElement('td');
                const dropZone = document.createElement('div');
                dropZone.className = 'drop-zone';
                dropZone.innerHTML = `
                    <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 5px; color: #2d3748;">問題 ${mondaiNo}</div>
                    <div class="drop-zone-text">sb3ファイルをドラッグ＆ドロップ<br>または</div>
                    <button class="btn-upload" onclick="document.getElementById('file-input-${kadaiId}').click()">ファイルを選択</button>
                    <input type="file" id="file-input-${kadaiId}" accept=".sb3">
                    <div class="file-label" id="file-name-${kadaiId}">未選択</div>
                `;
                tdInput.appendChild(dropZone);

                // --- 列2: 判定結果のセル ---
                const tdResult = document.createElement('td');
                tdResult.className = 'result-col status-unexecuted';
                tdResult.id = `result-${kadaiId}`;
                tdResult.textContent = '未実行';

                tr.appendChild(tdInput);
                tr.appendChild(tdResult);
                tableBody.appendChild(tr);

                // --- イベントリスナーの登録 ---
                const fileInput = document.getElementById(`file-input-${kadaiId}`);
                const fileNameDisplay = document.getElementById(`file-name-${kadaiId}`);

                // ドラッグ&ドロップのイベント設定
                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropZone.classList.add('hover');
                });

                dropZone.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('hover');
                });

                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('hover');
                    const file = e.dataTransfer.files[0];
                    if (file && file.name.endsWith('.sb3')) {
                        fileInput.files = e.dataTransfer.files; // input要素にも状態を同期
                        fileNameDisplay.textContent = file.name;
                        startCheck(kadaiId, mondaiNo, file);
                    } else {
                        alert('拡張子が.sb3のScratchプロジェクトファイルを選択してください。');
                    }
                });

                // ボタンからのファイル選択時のイベント設定
                fileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file && file.name.endsWith('.sb3')) {
                        fileNameDisplay.textContent = file.name;
                        startCheck(kadaiId, mondaiNo, file);
                    } else {
                        fileNameDisplay.textContent = '未選択';
                    }
                });

                const elem = document.createElement("a");
                elem.href = kadaiCheckFilename(kadaiId);
                elem.textContent = `${mondaiNo} (${kadaiId})`;
                document.getElementById("toOriginalPanel").appendChild(elem);
            })

            updateKadaiStatus();
        });

        const testCache = {};

        async function loadKadaiTestsAndEval(kadaiId) {
            if (testCache[kadaiId]) return testCache[kadaiId];

            const src = kadaiCheckFilename(kadaiId);
            const response = await fetch(src);
            if (!response.ok) throw new Error(`ファイル ${src} の読み込みに失敗しました。`);

            const scriptContent = await response.text();

            let testsRaw = null;
            try {
                // 取得したJSを関数スコープ内で評価する (複数課題間で const 変数等の名前衝突を防ぐ)
                // eslint-disable-next-line no-eval
                testsRaw = eval(`(function () { const module = { exports: {} }; \n${scriptContent}\n; return module.exports; })();`);
            } catch (err) {
                // Whisker形式のテストではなく、単純な関数定義(グローバル)の場合のフォールバック用としてタグ埋め込みも試行
                console.warn(`Whisker形式の解析には失敗しました。レガシー形式としてロードを試みます: ${err.message}`);

                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = () => reject(new Error(`スクリプト ${src} の読み込みに失敗しました。`));
                    document.head.appendChild(script);
                });
                return null;
            }

            testCache[kadaiId] = testsRaw;
            return testsRaw;
        }

        // ファイルが読み込まれたら即座にチェック開始
        async function startCheck(kadaiId, mondaiNo, file) {

            if (false === checkStudentId()) {
                return;
            }

            const resultCell = document.getElementById(`result-${kadaiId}`);

            // 状態を「判定中」に変更
            resultCell.textContent = '判定中...';
            resultCell.className = 'result-col status-checking';

            try {
                // 1. 各課題用のJSコードを取得してテストを取り出す
                const testsRaw = await loadKadaiTestsAndEval(kadaiId);

                // 2. sb3ファイルを ArrayBuffer として読み取る
                const arrayBuffer = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(new Error("ファイルの読み込み中にエラーが発生しました。"));
                    reader.readAsArrayBuffer(file);
                });

                // 3. Whisker VMの準備ができているか確認
                if (!window.Whisker || !window.Whisker.scratch || !window.Whisker.scratch.vm) {
                    throw new Error("Whisker / Scratch VM の初期化が完了していません。再読み込みをお試しください。");
                }

                const vm = window.Whisker.scratch.vm;

                // 4. バックグラウンドで干渉しないよう現在実行されていれば停止する
                vm.stopAll();

                // 5. 判定ロジックの呼び出し
                let isSuccess = false;

                // kadai*.js が Whisker のテスト形式 ( module.exports = [{test: ..., ...}] ) を想定
                if (testsRaw && Array.isArray(testsRaw) && testsRaw.length > 0 && typeof testsRaw[0].test === 'function') {
                    // Whisker Test Runner 経由で実行
                    const tests = window.Whisker.TestRunnerClass.convertTests(testsRaw);
                    const props = {
                        accelerationFactor: 1,
                        seed: Date.now(),
                        projectName: "kadai",
                        mutators: ['NONE'],
                        mutationBudget: 0,
                        maxMutants: 0,
                        mutantDownload: false,
                        log: false,
                        headless: true,
                        useSaveStates: false,
                        traceBlockCoverage: false,
                        traceBranchCoverage: false,
                        traceAttributes: false,
                        traceDebug: false
                    };

                    // sb3をVMにロードする処理は testRunner.runTests の内部でも実施されるためそのまま投げる
                    const [finalResults] = await window.Whisker.testRunner.runTests(
                        vm,
                        arrayBuffer,
                        tests,
                        window.Whisker.modelTester,
                        props
                    );

                    if (finalResults && finalResults["kadai"] && finalResults["kadai"].length > 0) {
                        const status = finalResults["kadai"][0].status;
                        isSuccess = (status === window.Whisker.TestClass.PASS);
                    } else {
                        throw new Error("テスト結果が取得できませんでした。");
                    }
                } else {
                    // 単純な関数エクスポートの場合のフォールバック (従来の check() 呼び出し)
                    await vm.loadProject(arrayBuffer); // ここでロード

                    const specificCheckFunc = window[`check${kadaiId}`];
                    const commonCheckFunc = window.check;

                    if (typeof specificCheckFunc === 'function') {
                        isSuccess = await specificCheckFunc(vm.runtime);
                    } else if (typeof commonCheckFunc === 'function') {
                        isSuccess = await commonCheckFunc(vm.runtime);
                    } else {
                        throw new Error(`判定用関数 check(runtime) または Whisker 形式のテストが見つかりません。`);
                    }
                }

                // 6. 判定結果の表示更新
                if (isSuccess === true || isSuccess === '合格' || isSuccess === 'Success') {
                    // ※check関数が boolean を返す想定ですが、柔軟に対応できるようにしています。
                    resultCell.textContent = '合格';
                    resultCell.className = 'result-col status-success';

                    post({ kadaiId, mondaiNo, success: "合格" });
                } else {
                    resultCell.textContent = '不合格';
                    resultCell.className = 'result-col status-fail';

                    post({ kadaiId, mondaiNo, success: "不合格" });
                }

            } catch (error) {
                console.error("判定中にエラーが発生しました:", error);
                resultCell.textContent = 'エラー'; // 長いメッセージはツールチップ等にした方が良いかもしれませんが、シンプルに表示
                resultCell.className = 'result-col status-fail';
                // 詳細をコンソールで確認できるようにしつつ、必要ならエラー内容をUIにも出す
                resultCell.title = error.message;

                post({ kadaiId, mondaiNo, success: "エラー" });
            }
        }
    </script>

    <hr>
    <div>debug用 基本はここは触らなくてよいです</div>
    <div id="toOriginalPanel" class="flex flex-row gap-2">
    </div>

    <!-- Footer -->
    <div id="footer" role="contentinfo" style="display: none;"></div>

</body>
